version: "3.9"

services:
    app:
        build: .
        container_name: fde-ai-work-items
        ports:
            - "3010:3000"
        volumes:
            - sqlite_data:/app/prisma/data
        restart: unless-stopped
        environment:
            - NODE_ENV=production
            - DATABASE_URL=file:/app/prisma/data/dev.db

volumes:
    sqlite_data:
